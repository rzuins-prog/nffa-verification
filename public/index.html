<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFFA Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1f2937;
    padding:50px;
    border-radius:18px;
    text-align:center;
    width:450px;
    box-shadow:0 0 35px rgba(0,0,0,.45);
}

img{
    width:120px;
    border-radius:100%;
    margin-bottom:20px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#bdbdbd;
    margin-bottom:30px;
}

button{
    background:#6d28d9;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#7c3aed;
}
</style>

</head>
<body>

<div class="card">

<img src="https://tr.rbxcdn.com/180DAY-6d73dcd16cf7e7e3e9d8db3dbd1a6384/420/420/Image/Png" alt="Logo">

<h1>NFFA Verification</h1>

<p>
Verify your Roblox account to gain access to the NFFA Discord server.
</p>

<button>
Verify with Roblox
</button>

</div>

</body>
</html>
